<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Combate ao Feminicídio</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

.video {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* slides */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  opacity: 0;
  padding: 20px;
}

/* texto */
.texto {
  font-size: 40px;
  font-weight: bold;
}

/* animação glow + aumento */
.animar {
  animation: efeito 1s ease-out forwards;
}

@keyframes efeito {
  0% {
    transform: scale(0.5);
    opacity: 0;
    color: white;
    text-shadow: none;
  }
  50% {
    transform: scale(1.3);
    opacity: 1;
  }
  100% {
    transform: scale(1);
    color: #ff4d4d;
    text-shadow:
      0 0 10px red,
      0 0 20px crimson,
      0 0 40px red;
  }
}

/* imagem */
img {
  width: 280px;
  border-radius: 15px;
  transition: transform 1s;
}

.slide.ativo img {
  transform: scale(1.1);
}

/* fundos */
.f1 { background: linear-gradient(black, crimson); }
.f2 { background: linear-gradient(black, purple); }
.f3 { background: linear-gradient(black, darkred); }

/* barra */
.barra {
  position: absolute;
  bottom: 0;
  height: 5px;
  background: red;
  width: 0%;
}
</style>
</head>

<body>

<audio id="audio" autoplay>
  <source src="audio.mp3" type="audio/mp3">
</audio>

<div class="video">

  <!-- SLIDES COM IMAGEM -->

  <div class="slide f1 ativo">
    <div>
      <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330"><br><br>
      <div class="texto">Você já parou para pensar no que é feminicídio?</div>
    </div>
  </div>

  <div class="slide f2">
    <div>
      <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9"><br><br>
      <div class="texto">O silêncio também machuca</div>
    </div>
  </div>

  <div class="slide f3">
    <div>
      <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"><br><br>
      <div class="texto">Nem toda dor é visível</div>
    </div>
  </div>

  <div class="slide f1">
    <div>
      <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba"><br><br>
      <div class="texto">Muitas mulheres vivem com medo</div>
    </div>
  </div>

  <div class="slide f2">
    <div>
      <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"><br><br>
      <div class="texto">Apoiar pode salvar vidas</div>
    </div>
  </div>

  <div class="slide f3">
    <div>
      <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429"><br><br>
      <div class="texto">Ainda há esperança</div>
    </div>
  </div>

  <div class="slide f1">
    <div class="texto">Denuncie — Ligue 180</div>
  </div>

  <div class="slide f2">
    <div class="texto">Sua atitude pode salvar uma vida</div>
  </div>

  <!-- barra -->
  <div class="barra" id="barra"></div>

</div>

<script>
const slides = document.querySelectorAll(".slide");
const barra = document.getElementById("barra");
const audio = document.getElementById("audio");

let atual = 0;
let tempo = 4000;

function animarTexto(slide) {
  const texto = slide.querySelector(".texto");
  if (!texto) return;

  texto.classList.remove("animar");

  setTimeout(() => {
    texto.classList.add("animar");
  }, 50);
}

function trocarSlide() {
  slides[atual].style.opacity = 0;
  atual++;

  if (atual >= slides.length) return;

  slides[atual].style.opacity = 1;
  animarTexto(slides[atual]);

  animarBarra();
  setTimeout(trocarSlide, tempo);
}

function animarBarra() {
  barra.style.transition = "none";
  barra.style.width = "0%";

  setTimeout(() => {
    barra.style.transition = `width ${tempo}ms linear`;
    barra.style.width = "100%";
  }, 50);
}

// iniciar
slides[0].style.opacity = 1;
animarTexto(slides[0]);
animarBarra();
setTimeout(trocarSlide, tempo);

// autoplay
window.onload = () => {
  audio.play().catch(() => {
    document.body.addEventListener("click", () => {
      audio.play();
    });
  });
};
</script>

</body>
</html>
